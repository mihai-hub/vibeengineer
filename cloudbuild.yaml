# ============================================================================
# GOOGLE CLOUD BUILD — VIBEENGINEER
# ============================================================================
# Secrets bound directly from Secret Manager via --set-secrets (never touch bash)
# Non-sensitive vars inlined via --set-env-vars

options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _REGION: europe-west1
  _PROJECT: jeff-asi
  _SERVICE: vibeengineer

steps:
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --source=.
      - --region=${_REGION}
      - --project=${_PROJECT}
      - --platform=managed
      - --allow-unauthenticated
      - --port=3000
      - --min-instances=0
      - --max-instances=3
      - --memory=1Gi
      - --cpu=2
      - --set-env-vars=NODE_ENV=production,JEFF_BACKEND_URL=https://api.jeff-asi.com,VIBE_GCS_BUCKET=vibeengineer-apps
      - --set-secrets=ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest,VIBE_OWNER_SECRET=VIBE_OWNER_SECRET:latest,JEFF_API_KEY=JEFF_API_KEY:latest,SUPABASE_URL=SUPABASE_URL:latest,SUPABASE_SERVICE_ROLE=SUPABASE_SERVICE_ROLE:latest,NEXT_PUBLIC_SUPABASE_URL=NEXT_PUBLIC_SUPABASE_URL:latest,NEXT_PUBLIC_SUPABASE_ANON_KEY=NEXT_PUBLIC_SUPABASE_ANON_KEY:latest,STRIPE_SECRET_KEY=STRIPE_SECRET_KEY:latest,STRIPE_WEBHOOK_SECRET=STRIPE_WEBHOOK_SECRET:latest,STRIPE_PRICE_PRO=STRIPE_PRICE_PRO:latest,STRIPE_PRICE_POWER=STRIPE_PRICE_POWER:latest,STRIPE_PRICE_PAYG=STRIPE_PRICE_PAYG:latest
