# ============================================================================
# GOOGLE CLOUD BUILD — VIBEENGINEER
# ============================================================================
# Trigger: push to master branch (Cloud Build trigger in GCP console)
# Uses Cloud Run source-based deploy (matches existing service config).
# No Dockerfile needed — Google Buildpacks auto-detects Next.js.

options:
  logging: CLOUD_LOGGING_ONLY

substitutions:
  _REGION: europe-west1
  _PROJECT: jeff-asi
  _SERVICE: vibeengineer

steps:
  # ── Deploy from source (matches existing Cloud Run service config) ─────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy
    entrypoint: gcloud
    args:
      - run
      - deploy
      - $_SERVICE
      - --source=.
      - --region=$_REGION
      - --project=$_PROJECT
      - --platform=managed
      - --allow-unauthenticated
      - --port=3000
      - --min-instances=0
      - --max-instances=3
      - --memory=512Mi
      - --cpu=1
      - --set-env-vars=NODE_ENV=production,JEFF_BACKEND_URL=https://api.jeff-asi.com,JEFF_API_KEY=47012794e687f62c3f36458391a22207,VIBE_GCS_BUCKET=vibeengineer-apps,E2B_API_KEY=e2b_cef01a80c2e3eba211dd72c0b8fc3bfc106bf444
